# CI/CD Pipeline — runs on every push and PR to main
# Improvements implemented:
#   ✅ Lint with ruff
#   ✅ Unit + integration tests with pytest
#   ✅ Docker image build verification
#   ✅ Auto-deploy to staging on merge to main (placeholder step)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/ prompts/ --ignore E501,E402

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rag-project:${{ github.sha }} .
      - name: Smoke test container
        run: |
          docker run --rm \
            -e GOOGLE_API_KEY=dummy \
            -e GROQ_API_KEY=dummy \
            -e TAVILY_API_KEY=dummy \
            rag-project:${{ github.sha }} \
            python -c "from app.config.settings import CHUNK_SIZE; print('OK')"

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to container registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push image
        run: |
          docker tag rag-project:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest
      - name: Deploy (placeholder — replace with your deployment command)
        run: echo "Deploy ghcr.io/${{ github.repository }}:latest to staging"
